<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Abstract Flowing Background</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 30%, #16213e 70%, #0f3460 100%);
        overflow: hidden;
        position: relative;
      }
      /* Flowing wave particles */
      .wave-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      .wave {
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(ellipse at center, rgba(74, 144, 226, 0.15) 0%, transparent 50%);
        border-radius: 50%;
        animation: waveFlow 20s infinite linear;
        transform-origin: center;
      }
      .wave:nth-child(1) {
        animation-delay: 0s;
        animation-duration: 25s;
        background: radial-gradient(ellipse at center, rgba(74, 144, 226, 0.1) 0%, transparent 40%);
      }
      .wave:nth-child(2) {
        animation-delay: 8s;
        animation-duration: 30s;
        background: radial-gradient(ellipse at center, rgba(236, 72, 153, 0.08) 0%, transparent 45%);
      }
      .wave:nth-child(3) {
        animation-delay: 16s;
        animation-duration: 35s;
        background: radial-gradient(ellipse at center, rgba(139, 69, 199, 0.12) 0%, transparent 38%);
      }
      @keyframes waveFlow {
        0% {
          transform: rotate(0deg) scale(0.8);
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        80% {
          opacity: 1;
        }
        100% {
          transform: rotate(360deg) scale(1.2);
          opacity: 0;
        }
      }
      /* Floating energy orbs */
      .orbs-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
      }
      .energy-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(1px);
        animation: energyFloat 15s infinite ease-in-out;
      }
      .orb1 {
        width: 120px;
        height: 120px;
        background: radial-gradient(circle, rgba(100, 200, 255, 0.4) 0%, rgba(74, 144, 226, 0.2) 40%, transparent 70%);
        top: 20%;
        left: 10%;
        animation-duration: 18s;
        animation-delay: 0s;
      }
      .orb2 {
        width: 80px;
        height: 80px;
        background: radial-gradient(circle, rgba(255, 100, 200, 0.35) 0%, rgba(236, 72, 153, 0.15) 40%, transparent 70%);
        top: 70%;
        left: 80%;
        animation-duration: 22s;
        animation-delay: 3s;
      }
      .orb3 {
        width: 100px;
        height: 100px;
        background: radial-gradient(circle, rgba(180, 100, 255, 0.3) 0%, rgba(139, 69, 199, 0.18) 40%, transparent 70%);
        top: 40%;
        left: 70%;
        animation-duration: 25s;
        animation-delay: 6s;
      }
      .orb4 {
        width: 60px;
        height: 60px;
        background: radial-gradient(circle, rgba(100, 255, 180, 0.4) 0%, rgba(34, 197, 94, 0.2) 40%, transparent 70%);
        top: 60%;
        left: 20%;
        animation-duration: 20s;
        animation-delay: 9s;
      }
      .orb5 {
        width: 140px;
        height: 140px;
        background: radial-gradient(circle, rgba(255, 180, 100, 0.25) 0%, rgba(251, 146, 60, 0.12) 40%, transparent 70%);
        top: 10%;
        left: 50%;
        animation-duration: 28s;
        animation-delay: 12s;
      }
      @keyframes energyFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        25% {
          transform: translate(150px, -100px) scale(1.1);
        }
        50% {
          transform: translate(-100px, 80px) scale(0.9);
        }
        75% {
          transform: translate(80px, -150px) scale(1.05);
        }
      }
      /* Particle system */
      .particles-system {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 3;
      }
      .micro-particle {
        position: absolute;
        width: 2px;
        height: 2px;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 50%;
        animation: microFloat 12s infinite linear;
      }
      .micro-particle:nth-child(1) {
        left: 5%;
        top: 15%;
        animation-delay: 0s;
        animation-duration: 14s;
      }
      .micro-particle:nth-child(2) {
        left: 15%;
        top: 75%;
        animation-delay: 2s;
        animation-duration: 18s;
      }
      .micro-particle:nth-child(3) {
        left: 85%;
        top: 25%;
        animation-delay: 4s;
        animation-duration: 16s;
      }
      .micro-particle:nth-child(4) {
        left: 75%;
        top: 85%;
        animation-delay: 6s;
        animation-duration: 20s;
      }
      .micro-particle:nth-child(5) {
        left: 45%;
        top: 5%;
        animation-delay: 1s;
        animation-duration: 15s;
      }
      .micro-particle:nth-child(6) {
        left: 95%;
        top: 65%;
        animation-delay: 3s;
        animation-duration: 19s;
      }
      .micro-particle:nth-child(7) {
        left: 25%;
        top: 45%;
        animation-delay: 5s;
        animation-duration: 17s;
      }
      .micro-particle:nth-child(8) {
        left: 65%;
        top: 55%;
        animation-delay: 7s;
        animation-duration: 21s;
      }
      .micro-particle:nth-child(9) {
        left: 35%;
        top: 85%;
        animation-delay: 1.5s;
        animation-duration: 13s;
      }
      .micro-particle:nth-child(10) {
        left: 55%;
        top: 25%;
        animation-delay: 3.5s;
        animation-duration: 22s;
      }
      @keyframes microFloat {
        0% {
          transform: translateY(0px) translateX(0px);
          opacity: 0;
        }
        10%,
        90% {
          opacity: 1;
        }
        25% {
          transform: translateY(-200px) translateX(100px);
        }
        50% {
          transform: translateY(-100px) translateX(-150px);
        }
        75% {
          transform: translateY(-300px) translateX(50px);
        }
        100% {
          transform: translateY(-400px) translateX(-100px);
          opacity: 0;
        }
      }
      /* Flowing light streams */
      .light-streams {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 4;
      }
      .light-stream {
        position: absolute;
        height: 2px;
        background: linear-gradient(90deg,
            transparent 0%,
            rgba(255, 255, 255, 0.1) 20%,
            rgba(74, 144, 226, 0.6) 50%,
            rgba(255, 255, 255, 0.1) 80%,
            transparent 100%);
        animation: streamFlow 8s infinite linear;
        filter: blur(0.5px);
      }
      .stream1 {
        top: 20%;
        width: 400px;
        animation-delay: 0s;
      }
      .stream2 {
        top: 40%;
        width: 300px;
        animation-delay: 2.5s;
        background: linear-gradient(90deg,
            transparent 0%,
            rgba(255, 255, 255, 0.1) 20%,
            rgba(236, 72, 153, 0.6) 50%,
            rgba(255, 255, 255, 0.1) 80%,
            transparent 100%);
      }
      .stream3 {
        top: 60%;
        width: 350px;
        animation-delay: 5s;
        background: linear-gradient(90deg,
            transparent 0%,
            rgba(255, 255, 255, 0.1) 20%,
            rgba(139, 69, 199, 0.6) 50%,
            rgba(255, 255, 255, 0.1) 80%,
            transparent 100%);
      }
      .stream4 {
        top: 80%;
        width: 280px;
        animation-delay: 7.5s;
        background: linear-gradient(90deg,
            transparent 0%,
            rgba(255, 255, 255, 0.1) 20%,
            rgba(34, 197, 94, 0.6) 50%,
            rgba(255, 255, 255, 0.1) 80%,
            transparent 100%);
      }
      @keyframes streamFlow {
        0% {
          left: -400px;
          opacity: 0;
        }
        10%,
        90% {
          opacity: 1;
        }
        100% {
          left: 100%;
          opacity: 0;
        }
      }
      /* Ambient glow overlay */
      .ambient-glow {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(ellipse at 20% 30%, rgba(74, 144, 226, 0.03) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 70%, rgba(236, 72, 153, 0.02) 0%, transparent 50%),
          radial-gradient(ellipse at 40% 80%, rgba(139, 69, 199, 0.03) 0%, transparent 50%);
        animation: ambientPulse 6s ease-in-out infinite;
        z-index: 5;
      }
      @keyframes ambientPulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.6;
        }
      }
      /* Performance optimization */
      * {
        will-change: transform, opacity;
        transform-style: preserve-3d;
        backface-visibility: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Flowing Waves -->
    <div class="wave-container">
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
    </div>
    <!-- Energy Orbs -->
    <div class="orbs-container">
      <div class="energy-orb orb1"></div>
      <div class="energy-orb orb2"></div>
      <div class="energy-orb orb3"></div>
      <div class="energy-orb orb4"></div>
      <div class="energy-orb orb5"></div>
    </div>
    <!-- Micro Particles -->
    <div class="particles-system">
      <div class="micro-particle"></div>
      <div class="micro-particle"></div>
      <div class="micro-particle"></div>
      <div class="micro-particle"></div>
      <div class="micro-particle"></div>
      <div class="micro-particle"></div>
      <div class="micro-particle"></div>
      <div class="micro-particle"></div>
      <div class="micro-particle"></div>
      <div class="micro-particle"></div>
    </div>
    <!-- Light Streams -->
    <div class="light-streams">
      <div class="light-stream stream1"></div>
      <div class="light-stream stream2"></div>
      <div class="light-stream stream3"></div>
      <div class="light-stream stream4"></div>
    </div>
    <!-- Ambient Glow -->
    <div class="ambient-glow"></div>
  </body>
</html>
